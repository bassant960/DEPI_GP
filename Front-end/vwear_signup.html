<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - VWear</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
    theme: {
        extend: {
            fontFamily: {
                sans: ['Inter', 'sans-serif'],
            },
            colors: {
                brand: {
                    500: '#8b5cf6',
                    600: '#7c3aed',
                },
                accent: {
                    500: '#ec4899',
                }
            }
        }
    }
}
</script>

<style>
.bg-mesh {
    background-color: #faf5ff;
    background-image:
        radial-gradient(at 10% 10%, rgba(139, 92, 246, 0.2), transparent 50%),
        radial-gradient(at 90% 10%, rgba(236, 72, 153, 0.2), transparent 50%),
        radial-gradient(at 50% 50%, rgba(59, 130, 246, 0.15), transparent 50%);
}

.glass-card {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.8);
}
</style>
</head>

<body class="bg-mesh font-sans flex items-center justify-center min-h-screen px-4">

<!-- Sign Up Card -->
<div class="glass-card rounded-3xl p-6 sm:p-10 w-full max-w-md shadow-xl">

    <!-- Logo -->
    <div class="text-center mb-6 sm:mb-8">
        <div class="w-12 h-12 mx-auto bg-gradient-to-r from-brand-600 to-accent-500 text-white flex items-center justify-center rounded-xl text-xl font-bold">
            V
        </div>
        <h2 class="text-xl sm:text-2xl font-bold mt-4">Create Account</h2>
        <p class="text-gray-600 text-sm sm:text-base">Sign up to get started</p>
    </div>

    <!-- Google Button -->
    <button class="w-full flex items-center justify-center gap-3 bg-white border border-gray-200 py-3 rounded-xl font-semibold hover:bg-gray-50 transition mb-5">
        <!-- Google Icon -->
        <svg class="w-5 h-5" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.4 0 6.3 1.2 8.6 3.2l6.4-6.4C34.7 2.1 29.7 0 24 0 14.6 0 6.4 5.8 2.9 14.3l7.9 6.1C12.6 13.3 17.8 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.9 7.1l7.6 5.9c4.4-4.1 7.1-10.1 7.1-17z"/>
            <path fill="#FBBC05" d="M10.8 28.4c-.5-1.4-.8-2.9-.8-4.4s.3-3 .8-4.4l-7.9-6.1C1 16.3 0 20 0 24s1 7.7 2.9 10.9l7.9-6.5z"/>
            <path fill="#34A853" d="M24 48c6.5 0 12-2.1 16-5.7l-7.6-5.9c-2.1 1.4-4.8 2.3-8.4 2.3-6.2 0-11.4-3.8-13.2-9l-7.9 6.5C6.4 42.2 14.6 48 24 48z"/>
        </svg>

        Continue with Google
    </button>

    <!-- Divider -->
    <div class="flex items-center my-4">
        <div class="flex-grow h-px bg-gray-300"></div>
        <span class="px-3 text-sm text-gray-500">or</span>
        <div class="flex-grow h-px bg-gray-300"></div>
    </div>

    <!-- Form -->
    <form class="space-y-4">

        <input type="text" placeholder="Full Name"
            class="w-full px-4 py-3 rounded-xl bg-white/60 border border-white/80 focus:ring-2 focus:ring-brand-500 outline-none text-sm sm:text-base">

        <input type="email" placeholder="Email"
            class="w-full px-4 py-3 rounded-xl bg-white/60 border border-white/80 focus:ring-2 focus:ring-brand-500 outline-none text-sm sm:text-base">

        <input type="password" placeholder="Password"
            class="w-full px-4 py-3 rounded-xl bg-white/60 border border-white/80 focus:ring-2 focus:ring-brand-500 outline-none text-sm sm:text-base">

        <input type="password" placeholder="Confirm Password"
            class="w-full px-4 py-3 rounded-xl bg-white/60 border border-white/80 focus:ring-2 focus:ring-brand-500 outline-none text-sm sm:text-base">

        <button class="w-full bg-gradient-to-r from-brand-600 to-accent-500 text-white py-3 rounded-xl font-bold hover:opacity-90 transition">
            Sign Up
        </button>

    </form>

    <p class="text-center text-sm mt-5">
    Already have an account?
    <a href="vwear.html" class="text-brand-600 font-semibold hover:underline">
        Login
    </a>
</p>

</div>

</body>
</html>
