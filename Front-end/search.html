<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Catalog | VWear</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50:'#f5f3ff',100:'#ede9fe',200:'#ddd6fe',300:'#c4b5fd',400:'#a78bfa',500:'#8b5cf6',600:'#7c3aed',700:'#6d28d9',800:'#5b21b6',900:'#4c1d95' },
                        accent: { 400:'#f472b6',500:'#ec4899',600:'#db2777' }
                    }
                }
            }
        }
    </script>
    <style>
        .bg-mesh {
            background-color: #faf5ff;
            background-image:
                radial-gradient(at 10% 10%, rgba(139,92,246,0.15) 0px, transparent 50%),
                radial-gradient(at 90% 10%, rgba(236,72,153,0.15) 0px, transparent 50%),
                radial-gradient(at 50% 90%, rgba(59,130,246,0.1) 0px, transparent 50%);
            background-attachment: fixed;
        }
        .glass { background:rgba(255,255,255,0.7); backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,0.8); }
        .sidebar-link { transition: all 0.2s; }
        .sidebar-link:hover, .sidebar-link.active { background:rgba(139,92,246,0.1); color:#7c3aed; }
        .sidebar-link.active { border-right:3px solid #7c3aed; font-weight:700; }
        #sidebar { transition: transform 0.3s ease; }
        @media(max-width:1023px) {
            #sidebar.closed { transform: translateX(-100%); }
        }
        .cat-pill { transition: all 0.2s; }
        .cat-pill.active { background: linear-gradient(135deg,#7c3aed,#ec4899); color:#fff; border-color: transparent; }
        .outfit-card { transition: transform .2s, box-shadow .2s; }
        .outfit-card:hover { transform: translateY(-4px); box-shadow: 0 16px 32px rgba(124,58,237,.15); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f5f3ff; }
        ::-webkit-scrollbar-thumb { background: #c4b5fd; border-radius: 9999px; }
    </style>
</head>
<body class="font-sans text-gray-800 bg-mesh antialiased">

<!-- ══ MOBILE SIDEBAR OVERLAY ══ -->
<div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-30 hidden lg:hidden" onclick="closeSidebar()"></div>

<!-- ══════════════════════════════════════
     LAYOUT
══════════════════════════════════════ -->
<div class="flex min-h-screen">

    <!-- ══════════ SIDEBAR ══════════ -->
    <aside id="sidebar" class="fixed lg:sticky top-0 h-screen w-64 glass border-r border-white/60 flex flex-col z-40 lg:z-auto closed lg:transform-none">

        <!-- Logo -->
        <div class="p-6 border-b border-white/50 flex items-center justify-between">
            <a href="VWearHomeP.html" class="flex items-center gap-2">
                <div class="w-9 h-9 bg-gradient-to-br from-brand-600 to-accent-500 rounded-xl flex items-center justify-center text-white font-bold text-lg shadow-md">V</div>
                <span class="font-bold text-xl text-gray-900">V<span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-600 to-accent-500">Wear</span></span>
            </a>
            <button class="lg:hidden text-gray-500 hover:text-brand-600" onclick="closeSidebar()">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <!-- Nav Links -->
        <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
            <p class="text-[10px] uppercase tracking-widest text-gray-400 font-bold px-3 py-2 mt-2">Main</p>
            <a href="dashboard.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-gray-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Dashboard
            </a>
            <a href="TryOnPageDemo.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-gray-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                Virtual Try-On
            </a>
            <a href="search.html" class="sidebar-link active flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                Browse Catalog
            </a>
            

            <p class="text-[10px] uppercase tracking-widest text-gray-400 font-bold px-3 py-2 mt-4">Account</p>
            <a href="dashboard.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-gray-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                Edit Profile
            </a>
            <a href="VWearHomeP.html#contact" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-gray-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                Help & Support
            </a>
        </nav>

        <!-- User Footer in Sidebar -->
        <div class="p-4 border-t border-white/50">
            <div class="flex items-center gap-3 p-3 rounded-xl bg-white/30 border border-white/50">
                <div class="relative w-10 h-10 flex-shrink-0 rounded-full">
                    <div id="sidebar-avatar-wrap" class="w-10 h-10 rounded-full bg-gradient-to-br from-brand-500 to-accent-500 flex items-center justify-center text-white font-bold text-sm border-2 border-white shadow overflow-hidden">
                        <span id="sidebar-avatar-letter">U</span>
                        <img id="sidebar-avatar-img" src="" class="w-full h-full object-cover hidden absolute inset-0 rounded-full">
                    </div>
                </div>
                <div class="flex-1 min-w-0">
                    <p id="sidebar-name" class="text-sm font-bold text-gray-900 truncate">User</p>
                    <p id="sidebar-email" class="text-xs text-gray-500 truncate">user@vwear.com</p>
                </div>
                <button onclick="logout()" class="w-8 h-8 rounded-lg hover:bg-red-50 flex items-center justify-center transition-colors group flex-shrink-0" title="Log out">
                    <svg class="w-4 h-4 text-gray-400 group-hover:text-red-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                </button>
            </div>
        </div>
    </aside>

    <!-- ══════════ MAIN CONTENT ══════════ -->
    <div class="flex-1 flex flex-col min-w-0">

        <!-- Top Bar -->
        <header class="sticky top-0 z-20 glass border-b border-white/50 px-4 sm:px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button class="lg:hidden text-gray-600 hover:text-brand-600 p-1" onclick="openSidebar()">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <div>
                    <h1 class="font-bold text-gray-900 text-lg">Browse Catalog</h1>
                    <p class="text-xs text-gray-500 hidden sm:block">Find your next outfit by category or keyword.</p>
                </div>
            </div>
            <a href="TryOnPageDemo.html" class="bg-gradient-to-r from-brand-600 to-accent-500 text-white text-sm font-semibold px-4 py-2 rounded-full shadow-md hover:opacity-90 transition hidden sm:block">
                + New Try-On
            </a>
        </header>

        <!-- Page Body -->
        <main class="flex-1 p-4 sm:p-6 lg:p-8 space-y-6">

            <!-- Search + Categories -->
            <div class="glass rounded-2xl p-5">
                <!-- Search bar -->
                <div class="relative mb-4">
                    <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                    <input id="search-input" type="text" placeholder="Search dresses, jackets, shoes…"
                        oninput="filterOutfits(this.value)"
                        class="w-full pl-10 pr-4 py-2.5 rounded-xl bg-white/70 border border-white/80 text-sm text-gray-800
                               placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:border-transparent transition" />
                </div>
                <!-- Category pills -->
                <div class="flex flex-wrap gap-2">
                    <button onclick="selectCat(this,'All')"          class="cat-pill active px-4 py-1.5 rounded-full text-sm font-semibold border border-brand-200 bg-white/70">All</button>
                    <button onclick="selectCat(this,'Dresses')"      class="cat-pill px-4 py-1.5 rounded-full text-sm font-semibold border border-white/80 bg-white/50 text-gray-600 hover:border-brand-300 hover:text-brand-700">👗 Dresses</button>
                    <button onclick="selectCat(this,'Tops')"         class="cat-pill px-4 py-1.5 rounded-full text-sm font-semibold border border-white/80 bg-white/50 text-gray-600 hover:border-brand-300 hover:text-brand-700">👕 Tops</button>
                    <button onclick="selectCat(this,'Pants')"        class="cat-pill px-4 py-1.5 rounded-full text-sm font-semibold border border-white/80 bg-white/50 text-gray-600 hover:border-brand-300 hover:text-brand-700">👖 Pants</button>
                    <button onclick="selectCat(this,'Jackets')"      class="cat-pill px-4 py-1.5 rounded-full text-sm font-semibold border border-white/80 bg-white/50 text-gray-600 hover:border-brand-300 hover:text-brand-700">🧥 Jackets</button>
                    <button onclick="selectCat(this,'Shoes')"        class="cat-pill px-4 py-1.5 rounded-full text-sm font-semibold border border-white/80 bg-white/50 text-gray-600 hover:border-brand-300 hover:text-brand-700">👟 Shoes</button>
                    <button onclick="selectCat(this,'Accessories')"  class="cat-pill px-4 py-1.5 rounded-full text-sm font-semibold border border-white/80 bg-white/50 text-gray-600 hover:border-brand-300 hover:text-brand-700">👜 Accessories</button>
                    <button onclick="selectCat(this,'Formal')"       class="cat-pill px-4 py-1.5 rounded-full text-sm font-semibold border border-white/80 bg-white/50 text-gray-600 hover:border-brand-300 hover:text-brand-700">🎩 Formal</button>
                </div>
            </div>

            <!-- Outfit Grid -->
            <div class="flex items-center justify-between">
                <h2 class="text-base font-bold text-gray-800">Catalog</h2>
                <span id="outfit-count" class="text-xs text-gray-400">8 outfits</span>
            </div>
            <div id="outfit-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4"></div>
            <p id="no-results" class="hidden text-center text-gray-400 text-sm py-10">No outfits match your search.</p>

        </main>
    </div>
</div>

<script>
    // ── Auth check ──
    const token = localStorage.getItem('token') || 'preview-token';

    // ── Load user into sidebar ──
    function loadUser() {
        const name   = localStorage.getItem('vwear_name')   || 'User';
        const email  = localStorage.getItem('vwear_email')  || 'user@vwear.com';
        const avatar = localStorage.getItem('vwear_avatar') || '';
        document.getElementById('sidebar-name').textContent  = name;
        document.getElementById('sidebar-email').textContent = email;
        document.getElementById('sidebar-avatar-letter').textContent = name.charAt(0).toUpperCase();
        if (avatar) {
            const img = document.getElementById('sidebar-avatar-img');
            img.src = avatar; img.classList.remove('hidden');
            document.getElementById('sidebar-avatar-letter').style.display = 'none';
        }
    }
    loadUser();

    /* ── Outfit Data ── */
    const OUTFITS = [
      { id:1, name:'Floral Maxi Dress',    cat:'Dresses',     color:'#fce7f3', emoji:'👗', badge:'Trending' },
      { id:2, name:'Oversized Linen Top',  cat:'Tops',        color:'#ede9fe', emoji:'👕', badge:'New'      },
      { id:3, name:'Wide-Leg Chinos',      cat:'Pants',       color:'#fef3c7', emoji:'👖', badge:''         },
      { id:4, name:'Leather Biker Jacket', cat:'Jackets',     color:'#e0f2fe', emoji:'🧥', badge:'Hot'      },
      { id:5, name:'White Sneakers',       cat:'Shoes',       color:'#f0fdf4', emoji:'👟', badge:''         },
      { id:6, name:'Silk Evening Gown',    cat:'Formal',      color:'#fdf2f8', emoji:'👑', badge:'Premium'  },
      { id:7, name:'Canvas Tote',          cat:'Accessories', color:'#fff7ed', emoji:'👜', badge:''         },
      { id:8, name:'Striped Blazer',       cat:'Jackets',     color:'#f5f3ff', emoji:'🧥', badge:'New'      },
    ];

    let activeCat = 'All', searchQuery = '';

    function renderOutfits() {
      const grid  = document.getElementById('outfit-grid');
      const noRes = document.getElementById('no-results');
      const count = document.getElementById('outfit-count');
      const filtered = OUTFITS.filter(o =>
        (activeCat === 'All' || o.cat === activeCat) &&
        (o.name.toLowerCase().includes(searchQuery.toLowerCase()) || o.cat.toLowerCase().includes(searchQuery.toLowerCase()))
      );
      if (!filtered.length) {
        grid.innerHTML = ''; noRes.classList.remove('hidden');
        count.textContent = '0 outfits'; return;
      }
      noRes.classList.add('hidden');
      count.textContent = `${filtered.length} outfit${filtered.length !== 1 ? 's' : ''}`;
      grid.innerHTML = filtered.map(o => `
        <div class="outfit-card glass rounded-2xl overflow-hidden cursor-pointer group"
             onclick="window.location.href='TryOnPageDemo.html'">
          <div class="aspect-[3/4] flex items-center justify-center text-5xl" style="background:${o.color}">${o.emoji}</div>
          <div class="p-3">
            ${o.badge ? `<span class="inline-block text-[10px] font-bold px-2 py-0.5 rounded-full bg-brand-100 text-brand-700 mb-1">${o.badge}</span>` : ''}
            <p class="text-xs font-semibold text-gray-800 leading-snug">${o.name}</p>
            <p class="text-[10px] text-gray-400 mt-0.5">${o.cat}</p>
            <button class="mt-2 w-full text-[11px] font-semibold py-1.5 rounded-lg
                           bg-gradient-to-r from-brand-500 to-accent-500 text-white
                           opacity-0 group-hover:opacity-100 transition-opacity">Try On</button>
          </div>
        </div>`).join('');
    }

    function selectCat(btn, cat) {
      activeCat = cat;
      document.querySelectorAll('.cat-pill').forEach(p => {
        p.classList.remove('active');
        p.classList.add('bg-white/50');
      });
      btn.classList.add('active');
      renderOutfits();
    }
    function filterOutfits(q) { searchQuery = q; renderOutfits(); }

    renderOutfits();

    // ── Sidebar mobile ──
    function openSidebar() {
        document.getElementById('sidebar').classList.remove('closed');
        document.getElementById('sidebar-overlay').classList.remove('hidden');
    }
    function closeSidebar() {
        document.getElementById('sidebar').classList.add('closed');
        document.getElementById('sidebar-overlay').classList.add('hidden');
    }

    // ── Logout ──
    function logout() {
        localStorage.clear();
        window.location.href = 'vwear_login.html';
    }
</script>
</body>
</html>
