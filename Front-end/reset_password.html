<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - VWear</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold text-center text-purple-600 mb-6">Create New Password</h2>
        <form id="resetForm" class="space-y-4">
            <input type="password" id="newPass" placeholder="New Password" required class="w-full px-4 py-2 border rounded-lg outline-none">
            <input type="password" id="confirmPass" placeholder="Confirm New Password" required class="w-full px-4 py-2 border rounded-lg outline-none">
            <button type="submit" class="w-full bg-purple-600 text-white py-2 rounded-lg font-bold hover:bg-purple-700 transition">Reset Password</button>
        </form>
    </div>

    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPass').value;
            const confirmPassword = document.getElementById('confirmPass').value;

            if (newPassword !== confirmPassword) {
                alert("❌ Passwords do not match!");
                return;
            }

            // بنجيب التوكن من رابط الصفحة فوق أوتوماتيك
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            try {
                const response = await fetch('http://127.0.0.1:8000/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, new_password: newPassword })
                });

                const data = await response.json();
                if (response.ok) {
                    alert("✅ Password updated successfully! You can login now.");
                    window.location.href = 'vwear_login.html';
                } else {
                    alert("❌ " + data.detail);
                }
            } catch (error) {
                alert("Server Error");
            }
        });
    </script>
</body>
</html>
